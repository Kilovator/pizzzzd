<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rejestracja – Pizzeria Neapol</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css?v=2.0">
    <link rel="stylesheet" href="auth.css?v=2.0">
    <link rel="stylesheet" href="mobile.css?v=2.0">
    <link rel="stylesheet" href="footer.css?v=2.0">
    <link rel="stylesheet" href="/accessibility.css?v=2.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body class="auth-page">
    <a href="#main-content" class="skip-link">Przejdź do treści</a>
    <div class="side-decoration left-decoration"></div>
    <div class="side-decoration right-decoration"></div>

    <div class="container">
        <header>
            <a href="index.html" class="logo-link">
                <h1>Pizzeria Neapol</h1>
            </a>
            <div class="header-buttons">
            </div>
        </header>

        <main id="main-content">
            <div class="auth-container">
                <div class="auth-card">
                    <div class="auth-header">
                        <div class="auth-logo">
                            <i class="fas fa-pizza-slice"></i>
                        </div>
                        <h2>Dołącz do nas</h2>
                        <p>Odkryj prawdziwy smak neapolitańskiej pizzy</p>
                    </div>

                    <form id="registerForm" class="auth-form">
                        <div class="form-group">
                            <div class="input-group">
                                <i class="fas fa-user"></i>
                                <input type="text" id="name" name="name" placeholder=" " required>
                                <label for="name">Imię i nazwisko</label>
                            </div>
                            <div id="name-error" class="error-message" aria-live="assertive"></div>
                        </div>

                        <div class="form-group">
                            <div class="input-group">
                                <i class="fas fa-envelope"></i>
                                <input type="email" id="email" name="email" placeholder=" " required>
                                <label for="email">Adres e-mail</label>
                            </div>
                            <div id="email-error" class="error-message" aria-live="assertive"></div>
                        </div>

                        <div class="form-group">
                            <div class="input-group">
                                <i class="fas fa-phone"></i>
                                <input type="tel" id="phone" name="phone" placeholder=" " required>
                                <label for="phone">Numer telefonu</label>
                            </div>
                            <div id="phone-error" class="error-message" aria-live="assertive"></div>
                        </div>

                        <div class="form-group">
                            <div class="input-group">
                                <i class="fas fa-lock"></i>
                                <input type="password" id="password" name="password" placeholder=" " required>
                                <label for="password">Hasło</label>
                                <button type="button" class="toggle-password" tabindex="-1"
                                    aria-label="Pokaż/ukryj hasło">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            <div id="password-error" class="error-message" aria-live="assertive"></div>
                        </div>

                        <div class="form-group">
                            <div class="input-group">
                                <i class="fas fa-lock"></i>
                                <input type="password" id="confirmPassword" name="confirmPassword" placeholder=" "
                                    required>
                                <label for="confirmPassword">Powtórz hasło</label>
                                <button type="button" class="toggle-password" tabindex="-1"
                                    aria-label="Pokaż/ukryj powtórzone hasło">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            <div id="confirmPassword-error" class="error-message" aria-live="assertive"></div>
                        </div>

                        <div class="form-group checkbox-group">
                            <input type="checkbox" id="terms" name="terms" required>
                            <label for="terms">Akceptuję <a href="regulamin.html">regulamin</a> i
                                <a href="polityka-prywatnosci.html">politykę prywatności</a></label>
                            <div id="terms-error" class="error-message" aria-live="assertive"></div>
                        </div>

                        <button type="submit" class="auth-button">
                            <i class="fas fa-user-plus"></i> Zarejestruj się
                        </button>
                    </form>

                    <div class="auth-footer">
                        <p>Masz już konto? <a href="login.html">Zaloguj się</a></p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="footer-container"></div>

    <script type="module" src="auth.js"></script>
    <script type="module" src="mobile.js"></script>
    <script src="/accessibility.js"></script>
    <script>
        // Load global footer
        fetch('footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer-container').innerHTML = data;
            })
            .catch(err => console.error('Error loading footer:', err));
    </script>
</body>

</html>
