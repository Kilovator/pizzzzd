<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie – Pizzeria Neapol</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css?v=2.0">
    <link rel="stylesheet" href="auth.css?v=2.0">
    <link rel="stylesheet" href="mobile.css?v=2.0">
    <link rel="stylesheet" href="footer.css?v=2.0">
    <link rel="stylesheet" href="/accessibility.css?v=2.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body class="auth-page">
    <a href="#main-content" class="skip-link">Przejdź do treści</a>
    <div class="side-decoration left-decoration"></div>
    <div class="side-decoration right-decoration"></div>

    <div class="container">
        <header>
            <a href="index.html" class="logo-link">
                <h1>Pizzeria Neapol</h1>
            </a>
            <div class="header-buttons">
                <!-- Header buttons can be added here if needed -->
            </div>
        </header>

        <main id="main-content">
            <div class="auth-container">
                <div class="auth-card">
                    <div class="auth-header">
                        <div class="auth-logo">
                            <i class="fas fa-pizza-slice" aria-hidden="true"></i>
                        </div>
                        <h2>Witaj ponownie</h2>
                        <p>Zaloguj się, aby kontynuować pyszne zamówienie</p>
                    </div>

                    <form id="loginForm" class="auth-form">
                        <div class="form-group">
                            <div class="input-group">
                                <i class="fas fa-envelope" aria-hidden="true"></i>
                                <input type="email" id="email" name="email" placeholder=" " required>
                                <label for="email">Adres e-mail</label>
                            </div>
                            <div id="email-error" class="error-message" aria-live="assertive"></div>
                        </div>

                        <div class="form-group">
                            <div class="input-group">
                                <i class="fas fa-lock" aria-hidden="true"></i>
                                <input type="password" id="password" name="password" placeholder=" " required>
                                <label for="password">Hasło</label>
                                <button type="button" class="toggle-password" tabindex="-1"
                                    aria-label="Pokaż/ukryj hasło">
                                    <i class="fas fa-eye" aria-hidden="true"></i>
                                </button>
                            </div>
                            <div id="password-error" class="error-message" aria-live="assertive"></div>
                        </div>

                        <button type="submit" class="auth-button">
                            <i class="fas fa-sign-in-alt" aria-hidden="true"></i> Zaloguj się
                        </button>
                    </form>

                    <div class="auth-footer">
                        <p>Nie masz jeszcze konta? <a href="register.html">Zarejestruj się</a></p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="auth.js"></script>
    <script type="module" src="mobile.js"></script>
    <script type="module" src="/accessibility.js"></script>
</body>

</html>
