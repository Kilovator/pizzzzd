<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zamów pizzę – Pizzeria Neapol</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css?v=1.1">
    <link rel="stylesheet" href="auth.css?v=1.2">
    <link rel="stylesheet" href="mobile.css?v=1.2">
    <link rel="stylesheet" href="/accessibility.css?v=2.0">
    <style>
        /* На странице заказа скрываем кнопку меню и центрируем лого */
        .mobile-menu-toggle {
            display: none !important;
        }

        @media (max-width: 768px) {
            header {
                justify-content: center !important;
                text-align: center !important;
            }

            header .logo-link {
                display: block;
                text-align: center;
                width: 100%;
            }
        }
        body {
            min-height: 100vh;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
            display: block;
        }

        header {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            z-index: 10;
            text-align: center;
            pointer-events: none;
            background: none !important;
            backdrop-filter: none !important;
            border: none !important;
            box-shadow: none !important;
        }

        header a {
            pointer-events: auto;
        }

        header #accessibility-btn {
            pointer-events: auto;
        }

        .auth-container {
            margin-top: 0 !important;
            min-height: 100vh !important;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 100px 20px 40px !important;
            box-sizing: border-box;
            width: 100%;
        }

        .step {
            display: none;
        }

        .step.active {
            display: block;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .radio-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 24px;
        }

        .radio-option {
            background-color: var(--input-bg);
            border: 1px solid #222;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: var(--transition-smooth);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 10px;
        }

        .radio-option:hover {
            border-color: var(--primary-color);
            background-color: #1a1a1a;
        }

        .radio-option.selected {
            border-color: var(--primary-color);
            background-color: rgba(255, 107, 107, 0.1);
            box-shadow: 0 0 15px rgba(255, 107, 107, 0.1);
        }

        .radio-option i {
            font-size: 32px;
            color: var(--text-muted);
            transition: var(--transition-smooth);
        }

        .radio-option.selected i {
            color: var(--primary-color);
            transform: scale(1.1);
        }

        .radio-option span {
            font-weight: 600;
            color: var(--text-main);
        }

        .radio-option p {
            font-size: 12px;
            color: var(--text-muted);
            margin: 0;
        }

        .radio-option input {
            display: none;
        }

        .button-row {
            display: flex;
            gap: 15px;
            margin-top: 24px;
        }

        .button-row button,
        .button-row .auth-button {
            flex: 1;
            margin: 0;
            width: auto;
            min-width: 0;
        }

        .secondary-button {
            padding: 16px;
            background-color: #1a1a1a;
            color: var(--text-muted);
            border: 1px solid #222;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .secondary-button:hover {
            background-color: #252525;
            color: #fff;
            border-color: #444;
        }

        .order-confirmation-content {
            text-align: center;
        }

        .success-icon {
            font-size: 64px;
            color: #4cd137;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(76, 209, 55, 0.3));
        }

        .order-number-badge {
            display: inline-block;
            background-color: rgba(255, 107, 107, 0.1);
            color: var(--primary-color);
            padding: 8px 20px;
            border-radius: 30px;
            font-family: monospace;
            font-size: 20px;
            font-weight: 700;
            margin: 15px 0;
            border: 1px solid var(--primary-glow);
        }

        .waiting-info {
            background-color: var(--input-bg);
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0;
            border: 1px solid #222;
        }

        .pickup-info {
            background-color: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 24px;
            border-left: 4px solid var(--primary-color);
        }

        .pickup-info h3 {
            margin-top: 0;
            color: var(--primary-color);
        }

        textarea {
            width: 100%;
            background-color: var(--input-bg);
            color: #fff;
            padding: 16px 16px 16px 52px;
            border: 1px solid #222;
            border-radius: 12px;
            font-size: 16px;
            transition: var(--transition-smooth);
            min-height: 120px;
            resize: vertical;
        }

        textarea:focus {
            border-color: var(--primary-color);
            outline: none;
            background-color: #1a1a1a;
            box-shadow: 0 0 0 4px rgba(255, 107, 107, 0.15);
        }

        /* Floating label for textarea */
        .input-group i.fa-comment-dots {
            top: 24px !important;
            transform: none !important;
        }

        .input-group textarea+label {
            top: 24px;
            transform: none;
        }

        .input-group textarea:focus+label,
        .input-group textarea:not(:placeholder-shown)+label {
            top: -12px !important;
            left: 12px !important;
            font-size: 13px !important;
            font-weight: 600 !important;
            color: var(--primary-color) !important;
            background-color: var(--card-bg) !important;
            padding: 0 8px !important;
            transform: none !important;
        }
    </style>
</head>

<body class="auth-page">

    <div class="side-decoration left-decoration"></div>
    <div class="side-decoration right-decoration"></div>

    <header>
            <a href="index.html" class="logo-link">
                <h1>Pizzeria Neapol</h1>
            </a>
        </header>

        <main id="main-content">
            <div class="auth-container">
                <div class="auth-card">
                    <div class="auth-header">
                        <div class="auth-logo">
                            <i class="fas fa-pizza-slice"></i>
                        </div>
                        <h2 id="form-title">Zamówienie</h2>
                        <p id="form-subtitle">Krok 1: Dane kontaktowe</p>
                    </div>

                    <div class="auth-form">
                        <!-- Step 1: Customer Data -->
                        <div class="step active" id="step1">
                            <div class="form-group">
                                <div class="input-group">
                                    <i class="fas fa-user"></i>
                                    <input type="text" id="name" name="name" placeholder=" " required>
                                    <label for="name">Imię i nazwisko</label>
                                </div>
                                <div id="name-error" class="error-message"></div>
                            </div>

                            <div class="form-group">
                                <div class="input-group">
                                    <i class="fas fa-phone"></i>
                                    <input type="tel" id="phone" name="phone" placeholder=" " required>
                                    <label for="phone">Numer telefonu</label>
                                </div>
                                <div id="phone-error" class="error-message"></div>
                            </div>

                            <div class="form-group">
                                <div class="input-group">
                                    <i class="fas fa-envelope"></i>
                                    <input type="email" id="email" name="email" placeholder=" ">
                                    <label for="email">Adres e-mail (opcjonalnie)</label>
                                </div>
                            </div>

                            <div class="button-row">
                                <button type="button" onclick="window.location.href='index.html'"
                                    class="secondary-button">Anuluj</button>
                                <button type="button" id="nextToStep2" class="auth-button">Dalej <i
                                        class="fas fa-arrow-right"></i></button>
                            </div>
                        </div>

                        <!-- Step 2: Delivery Method -->
                        <div class="step" id="step2">
                            <div class="radio-group">
                                <div class="radio-option" data-value="dostawa">
                                    <input type="radio" name="delivery_type" id="delivery" value="dostawa">
                                    <i class="fas fa-motorcycle"></i>
                                    <span>Dostawa</span>
                                    <p>Pod Twój adres</p>
                                </div>
                                <div class="radio-option" data-value="odbior">
                                    <input type="radio" name="delivery_type" id="pickup" value="odbior">
                                    <i class="fas fa-store"></i>
                                    <span>Odbiór</span>
                                    <p>W restauracji</p>
                                </div>
                            </div>
                            <div id="delivery-error" class="error-message"
                                style="text-align: center; margin-bottom: 15px;"></div>

                            <div class="button-row">
                                <button type="button" id="backToStep1" class="secondary-button"><i
                                        class="fas fa-arrow-left"></i> Wstecz</button>
                                <button type="button" id="nextToStep3" class="auth-button">Dalej <i
                                        class="fas fa-arrow-right"></i></button>
                            </div>
                        </div>

                        <!-- Step 3: Delivery Address -->
                        <div class="step" id="step3-delivery">
                            <div class="form-group">
                                <div class="input-group">
                                    <i class="fas fa-map-marker-alt"></i>
                                    <input type="text" id="street" name="street" placeholder=" " required>
                                    <label for="street">Ulica i numer domu</label>
                                </div>
                                <div id="street-error" class="error-message"></div>
                            </div>

                            <div class="form-group">
                                <div class="input-group">
                                    <i class="fas fa-building"></i>
                                    <input type="text" id="apartment" name="apartment" placeholder=" ">
                                    <label for="apartment">Nr mieszkania (opcjonalnie)</label>
                                </div>
                            </div>

                            <div class="form-group">
                                <div class="input-group">
                                    <i class="fas fa-city"></i>
                                    <input type="text" id="city" name="city" placeholder=" " required>
                                    <label for="city">Miasto</label>
                                </div>
                                <div id="city-error" class="error-message"></div>
                            </div>

                            <div class="form-group">
                                <div class="input-group">
                                    <i class="fas fa-mail-bulk"></i>
                                    <input type="text" id="zipcode" name="zipcode" placeholder=" " required>
                                    <label for="zipcode">Kod pocztowy</label>
                                </div>
                                <div id="zipcode-error" class="error-message"></div>
                            </div>

                            <div class="form-group">
                                <div class="input-group">
                                    <i class="fas fa-comment-dots"></i>
                                    <textarea id="notes" name="notes" placeholder=" "></textarea>
                                    <label for="notes">Uwagi do dostawcy</label>
                                </div>
                            </div>

                            <div class="button-row">
                                <button type="button" id="backToStep2Delivery" class="secondary-button"><i
                                        class="fas fa-arrow-left"></i> Wstecz</button>
                                <button type="button" id="completeOrderDelivery" class="auth-button">Zamawiam <i
                                        class="fas fa-check"></i></button>
                            </div>
                        </div>

                        <!-- Step 3: Pickup Info -->
                        <div class="step" id="step3-pickup">
                            <div class="pickup-info">
                                <h3>Pizzeria Neapol</h3>
                                <p><i class="fas fa-location-dot"></i> ul. Przykładowa 123</p>
                                <p><i class="fas fa-city"></i> 00-000 Warszawa</p>
                            </div>

                            <div class="form-group">
                                <div class="input-group">
                                    <i class="fas fa-comment-dots"></i>
                                    <textarea id="pickup-notes" name="pickup-notes" placeholder=" "></textarea>
                                    <label for="pickup-notes">Uwagi do zamówienia</label>
                                </div>
                            </div>

                            <div class="button-row">
                                <button type="button" id="backToStep2Pickup" class="secondary-button"><i
                                        class="fas fa-arrow-left"></i> Wstecz</button>
                                <button type="button" id="completeOrderPickup" class="auth-button">Zamawiam <i
                                        class="fas fa-check"></i></button>
                            </div>
                        </div>

                        <!-- Step 4: Confirmation -->
                        <div class="step" id="step4-confirmation">
                            <div class="order-confirmation-content">
                                <i class="fas fa-check-circle success-icon"></i>
                                <h3>Dziękujemy za zamówienie!</h3>

                                <p>Twój numer zamówienia:</p>
                                <div class="order-number-badge" id="order-number"></div>

                                <div class="waiting-info">
                                    <p id="waiting-time"></p>
                                </div>

                                <p id="confirmation-message"
                                    style="color: var(--text-muted); font-size: 14px; margin-bottom: 30px;"></p>

                                <button type="button" onclick="window.location.href='index.html'" class="auth-button">
                                    Powrót do menu
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const formTitle = document.getElementById('form-title');
            const formSubtitle = document.getElementById('form-subtitle');

            const step1 = document.getElementById('step1');
            const step2 = document.getElementById('step2');
            const step3Delivery = document.getElementById('step3-delivery');
            const step3Pickup = document.getElementById('step3-pickup');
            const step4Confirmation = document.getElementById('step4-confirmation');

            const nextToStep2 = document.getElementById('nextToStep2');
            const backToStep1 = document.getElementById('backToStep1');
            const nextToStep3 = document.getElementById('nextToStep3');
            const backToStep2Delivery = document.getElementById('backToStep2Delivery');
            const backToStep2Pickup = document.getElementById('backToStep2Pickup');
            const completeOrderDelivery = document.getElementById('completeOrderDelivery');
            const completeOrderPickup = document.getElementById('completeOrderPickup');

            const radioOptions = document.querySelectorAll('.radio-option');
            let selectedDeliveryMethod = null;

            function updateHeader(title, subtitle) {
                formTitle.textContent = title;
                formSubtitle.textContent = subtitle;
            }

            nextToStep2.addEventListener('click', function () {
                if (validateStep1()) {
                    step1.classList.remove('active');
                    step2.classList.add('active');
                    updateHeader('Sposób dostawy', 'Krok 2: Wybierz metodę');
                }
            });

            backToStep1.addEventListener('click', function () {
                step2.classList.remove('active');
                step1.classList.add('active');
                updateHeader('Zamówienie', 'Krok 1: Dane kontaktowe');
            });

            radioOptions.forEach(option => {
                option.addEventListener('click', function () {
                    radioOptions.forEach(opt => {
                        opt.classList.remove('selected');
                        opt.querySelector('input').checked = false;
                    });

                    this.classList.add('selected');
                    this.querySelector('input').checked = true;
                    selectedDeliveryMethod = this.dataset.value;
                    document.getElementById('delivery-error').textContent = '';
                });
            });

            nextToStep3.addEventListener('click', function () {
                if (!selectedDeliveryMethod) {
                    document.getElementById('delivery-error').textContent = 'Proszę wybrać sposób dostarczenia';
                    return;
                }

                step2.classList.remove('active');
                if (selectedDeliveryMethod === 'dostawa') {
                    step3Delivery.classList.add('active');
                    updateHeader('Adres dostawy', 'Krok 3: Dane adresowe');
                } else {
                    step3Pickup.classList.add('active');
                    updateHeader('Odbiór osobisty', 'Krok 3: Informacje o odbiorze');
                }
            });

            backToStep2Delivery.addEventListener('click', function () {
                step3Delivery.classList.remove('active');
                step2.classList.add('active');
                updateHeader('Sposób dostawy', 'Krok 2: Wybierz metodę');
            });

            backToStep2Pickup.addEventListener('click', function () {
                step3Pickup.classList.remove('active');
                step2.classList.add('active');
                updateHeader('Sposób dostawy', 'Krok 2: Wybierz metodę');
            });

            completeOrderDelivery.addEventListener('click', function () {
                if (validateDeliveryAddress()) {
                    showOrderConfirmation('delivery');
                }
            });

            completeOrderPickup.addEventListener('click', function () {
                showOrderConfirmation('pickup');
            });

            function validateStep1() {
                let isValid = true;
                const name = document.getElementById('name').value.trim();
                const phone = document.getElementById('phone').value.trim();

                const nameInput = document.getElementById('name');
                const phoneInput = document.getElementById('phone');

                if (!name) {
                    document.getElementById('name-error').textContent = 'Proszę podać imię i nazwisko';
                    nameInput.closest('.input-group').classList.add('has-error');
                    isValid = false;
                } else {
                    document.getElementById('name-error').textContent = '';
                    nameInput.closest('.input-group').classList.remove('has-error');
                }

                if (!phone || !/^[0-9+\s()-]{9,15}$/.test(phone)) {
                    document.getElementById('phone-error').textContent = 'Proszę podać prawidłowy numer telefonu';
                    phoneInput.closest('.input-group').classList.add('has-error');
                    isValid = false;
                } else {
                    document.getElementById('phone-error').textContent = '';
                    phoneInput.closest('.input-group').classList.remove('has-error');
                }

                return isValid;
            }

            function validateDeliveryAddress() {
                let isValid = true;
                const street = document.getElementById('street').value.trim();
                const city = document.getElementById('city').value.trim();
                const zipcode = document.getElementById('zipcode').value.trim();

                if (!street) {
                    document.getElementById('street-error').textContent = 'Proszę podać ulicę i numer domu';
                    isValid = false;
                } else {
                    document.getElementById('street-error').textContent = '';
                }

                if (!city) {
                    document.getElementById('city-error').textContent = 'Proszę podać miasto';
                    isValid = false;
                } else {
                    document.getElementById('city-error').textContent = '';
                }

                if (!zipcode || !/^\d{2}-\d{3}$/.test(zipcode)) {
                    document.getElementById('zipcode-error').textContent = 'Proszę podać kod pocztowy (np. 00-000)';
                    isValid = false;
                } else {
                    document.getElementById('zipcode-error').textContent = '';
                }

                return isValid;
            }

            function showOrderConfirmation(type) {
                if (type === 'delivery') {
                    step3Delivery.classList.remove('active');
                } else {
                    step3Pickup.classList.remove('active');
                }

                updateHeader('Gotowe!', 'Zamówienie zostało przyjęte');

                const orderNumber = 'NEA-' + Math.floor(100000 + Math.random() * 900000);
                document.getElementById('order-number').textContent = orderNumber;

                const time = type === 'delivery' ?
                    Math.floor(30 + Math.random() * 30) :
                    Math.floor(15 + Math.random() * 15);
                document.getElementById('waiting-time').innerHTML = `<i class="fas fa-clock"></i> Przybliżony czas oczekiwania: <strong>${time} minut</strong>`;

                if (type === 'delivery') {
                    const street = document.getElementById('street').value;
                    const apartment = document.getElementById('apartment').value;
                    const city = document.getElementById('city').value;
                    const zipcode = document.getElementById('zipcode').value;

                    let address = `${street}`;
                    if (apartment) address += `, m. ${apartment}`;
                    address += `, ${zipcode} ${city}`;

                    document.getElementById('confirmation-message').textContent = `Dostawa na adres: ${address}`;
                } else {
                    document.getElementById('confirmation-message').textContent = 'Zapraszamy po odbiór do naszej restauracji.';
                }

                step4Confirmation.classList.add('active');
            }
        });
    </script>
    <script type="module" src="mobile.js"></script>
    <script src="/accessibility.js"></script>
</body>

</html>
